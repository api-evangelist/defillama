specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: DefiLlama
providerId: defillama
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - DeFi
  - Crypto
  - Plans
description: >-
  DefiLlama publishes two plan tiers: a free, no-authentication public API and a Pro API at
  $300/month that adds higher rate limits plus 38 exclusive endpoints (token unlocks, bridges,
  digital-asset treasuries). No additional usage-based billing.
sources:
  - https://defillama.com/pro-api
  - https://defillama.com/docs/api
plans:
  - id: defillama-public
    name: Public (Free)
    type: freemium
    description: Free public API, no authentication, 31 endpoints, fair-use rate limit.
    entries:
      - label: Monthly subscription
        name: public_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 31 endpoints
      - name: No authentication
      - name: Fair-use rate limit (~300 rpm)
  - id: defillama-pro
    name: Pro
    type: subscription
    description: $300/month flat fee for higher rate limits and 38 exclusive endpoints.
    entries:
      - label: Monthly subscription
        name: pro_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '300.00'
        userMultiplied: false
    elements:
      - name: 38 exclusive endpoints
      - name: 1,000 rpm
      - name: Token unlocks, bridges, treasuries
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
